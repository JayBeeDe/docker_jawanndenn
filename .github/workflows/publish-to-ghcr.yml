---
name: Build, publish and release docker image to GitHub Container Registry (GHCR)
on:
  push:
    branches:
      - ci
    tags:
      - "jawanndenn_v*"
jobs:
  publish-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check Initiating User
        if: github.actor != 'JayBeeDe'
        run: |
          echo "::error title=Unauthorized Access::User ${GITHUB_ACTOR} is not authorized."
          exit 1
      - name: Check out repository
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/jaybeede/jawanndenn:latest